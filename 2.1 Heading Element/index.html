<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heading Element</title>
  <style>
    h1 {
      color: red;
    }
    .heading {
      color: green;
    }

    #top {
      color: blue;
    }

    h2 {
      background-color: pink;
      display: block;
      /* height: 100px;
      width: 100px; */
    }
    h3, h4 {
      background-color: yellowgreen;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1 class="heading" id="top">Book</h1>
  <h2>Chapter 1</h2>
    <h3>Section 1</h3>
    <h3>Section 2</h3>
  <h2>Chapter 2</h2>
    <h3>Section 1</h3>
      <h4>Diagram 1</h4>
  <h2>Chapter 3</h2>
    <h3>Section 1</h3>
    <h3>Section 2</h3>
</body>
</html>
