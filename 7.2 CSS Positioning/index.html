<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    /* Write your code here */
    .blue-box {
      background-color: blue;
      height: 300px;
      width: 500px;
      position: absolute;
      margin: 200px 200px;
    }

    .red-circle {
      background-color: red;
      height: 200px;
      width: 200px;
      border-radius: 200px;
      position: relative;
      top: 150px;
      left: 250px;
    }

    html {
    scroll-behavior: smooth;
    height: 1200px;
    width: 1200px;
}
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
