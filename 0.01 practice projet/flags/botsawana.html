<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botsawana Flag</title>
    <style>
        body div {
            height: 600px;
            width: 900px;
            /* background-color: gray;
            position: absolute; */
        }
        .main {
            height: 600px;
            width: 900px;
            background-color: #6CACE4;
            position: relative;
        }
        .white {
            height: 120px;
            width: 900px;
            background-color: #FFF;
            position: absolute;
            top: 240px;
        }
        .black {
            height: 100px;
            width: 900px;
            background-color: #000;
            position: absolute;
            top: 10px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="white">
            <div class="black"></div>
        </div>
    </div>
</body>
</html>
