<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benin Flag</title>
    <style>
        body {
            height: 1000px;
            width: 1000px;
            background-color: gray;
            position: absolute;
        }
        .benin {
            height: 1000px;
            width: 330.33px;
            background-color: #008751;
            position: relative;
            left: 0px;
            right: 660.66px;
        }
        .yellow {
            height: 500px;
            width: 660.66px;
            background-color: #FCD116;
            position: absolute;
            left: 330.33px;
            right: 0px;
            top: 0px;
        }

        .green {
            height: 500px;
            width: 660.66px;
            background-color: #E8112D;
            position: absolute;
            left: 330.33px;
            right: 0px;
            top: 500px;
        }

    </style>
</head>
<body>
    <div class="benin"></div>
        <div class="yellow"></div>
            <div class="green"></div>
</body>
</html>
