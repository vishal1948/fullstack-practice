<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Flag</title>
    <style>
        .flag {
            height: 600px;
            width: 900px;
            background-color: gray;
        }
        .orange {
            height: 200px;
            width: 100%;
            background-color: orangered;
            position: relative;
        }

        .white {
            height: 200px;
            width: 100%;
            background-color: white;
            position: absolute;
            top: 200px;
        }

        .green {
            height: 200px;
            width: 100%;
            background-color: green;
            position: absolute;
            top: 200px;
        }

    </style>
</head>
<body>
    <div class="flag">
        <div class="orange">
            <div class="white">
                <div></div>
                <div class="green">

                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
