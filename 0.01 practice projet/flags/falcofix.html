<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcofix</title>
    <style>
        .blue-box {
            height: 500px;
            width: 900px;
            background-color: blue;
            display: block;
            position: relative;
        }

        .yellow {
            height: 450px;
            width: 800px;
            background-color: yellow;
            border-radius: 50%;
            position: relative;
            top: 25px;
            left: 50px;
        }

        .red {
            height: 450px;
            width: 700px;
            background-color: red;
            border-radius: 60%;
            position: relative;
            top: 0%;
            left: 50px;
        }

        p {
            color: aliceblue;
            font-size: 130px;
            text-align: center;
            position: relative;
            top: 150px;

        }
    </style>
</head>
<body>
    <div class="blue-box">
        <div class="yellow">
            <div class="red">
                <p id="brand">FALCOFIX</p>
            </div>
        </div>
    </div>
</body>
</html>
