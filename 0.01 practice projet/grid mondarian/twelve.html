<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>twelve</title>
    <style>
        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* p {
            display: in;
        } */
        .container {
            display: grid;
            height: 715px auto;
            width: 720px auto;
            background-color: black;
            grid-template-rows: 77px 167px 164px 80px 74px 35px 27px;
            grid-template-columns: 80px 80px 80px 165px 100px 100px 33px;
            gap: 10px;
            /* border-radius: 10%; */
            /* margin: 20px 0px 20px 20px; */
        }

        .White1 {
            grid-column: span 2;
            background-color: #f0fcef;
        }

        .White2 {
            grid-column: span 2;
            background-color: #f0fcef;
        }

        .Yellow1 {
            grid-column: span 2;
            background-color: yellow;
        }

        .White3 {
            grid-row: span 4;
            background-color: #f0fcef;
        }

        .White4 {
            background-color: #f0fcef;
        }

        .Red1 {
            grid-row: span 2;
            grid-column: span 3;
            background-color: firebrick;
        }

        .Yellow2 {
            grid-column: span 2;
            background-color: yellow;
        }

        .White5 {
            grid-row: span 2;
            background-color: #f0fcef;
        }

        .White6 {
            background-color: #f0fcef;
        }

        .Black1 {
            /* grid-row: span 2; */
            grid-column: span 2;
            background-color: rgb(56, 51, 51);
        }

        .White7 {
            background-color: #f0fcef;
        }

        .White8 {
            grid-column: span 2;
            background-color: #f0fcef;
        }

        .Yellow3 {
            grid-row: span 3;
            background-color: yellow;
        }

        
        .Black2 {
            grid-column: span 2;
            background-color: rgb(56, 51, 51);
        }

        .White9 {
            background-color: #f0fcef;
        }

        .Blue {
            grid-row: span 2;
            grid-column: span 2;
            background-color: blue;
        }

        .Red2 {
            grid-row: span 3;
            background-color: firebrick;
        }

        .White10 {
            grid-row: span 2;
            grid-column: span 2;
            background-color: #f0fcef;
        }

        .Black3 {
            background-color: rgb(56, 51, 51);
        }

        .White11 {
            grid-column: span 3;
            background-color: #f0fcef;
        }
        </style>
</head>
<body>
    <div class="container">
    <div class="White1"></div>
    <div class="White2"></div>
    <div class="Yellow1"></div>

    <div class="White3"></div>
    <div class="White4"></div>
    <div class="Red1"></div>
    <div class="Yellow2"></div>

    <div class="White5"></div>
    <div class="White6"></div>
    <div class="White6"></div>

    <div class="Black1"></div>
    <div class="White7"></div>
    <div class="White8"></div>

    <div class="Yellow3"></div>
    <div class="Black2"></div>
    <div class="White9"></div>
    <div class="Blue"></div>
    <div class="Red2"></div>

    <div class="White10"></div>
    <div class="Black3"></div>
    <div class="White11"></div>
    
    </div>

</html>
