<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eleven</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            /* margin: 0%; */
            /* padding: 0%; */
        }

        .grid-container {
            display: grid;
            height: 546px;
            width: 910px;
            background-color: black;
            grid-template-rows: 186px 102px 225px;
            grid-template-columns: 74px 311px 337px 135px;
            gap: 17px;
            /* padding: 0%; */
            /* margin-right: 0px; */
        }

        /* .item {
            
        } */
    
        .white1 {
        grid-row: span 2;
        grid-column: span 2;
        /* width: 404px;
        height: 308px; */
        background-color: gray;
        }

        .white2 {
            grid-row: span 2;
            /* width: 343px;
            height: 308px; */
            background-color: gray;
        }

        .white3 {
            /* width: auto; */
            background-color: gray;
        }

        .white4 {
            background-color: gray;
        }

        .white5 {
            background-color: gray;
        }

        .blue {
            background-color: blue;
        }
         
        .white6 {
            background-color: gray;
        }

        .yellow {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="item white1"></div>
        <div class="item white2"></div>
        <div class="item white3"></div>
        <div class="item white4"></div>

        <div class="item white5"></div>
        <div class="item blue"></div>
        <div class="item white6"></div>
        <div class="item yellow"></div>
    </div>
</body>
</html>
