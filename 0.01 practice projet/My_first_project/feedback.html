<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .feedback-form {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
        }
        .rating-group label {
            display: inline-block;
            margin-right: 10px;
            font-weight: normal;
        }
        button[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button[type="submit"]:hover {
            background-color: #0056b3;
        }
        .required::after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="button-container">
            <a href="Home.html" class="button">Home</a>
            <a href="Talim.html" class="button">Talims</a>
            <a href="about.html" class="button">About Us</a>
            <a href="feedback.html" class="button">Feedback</a>
        </div>

        <div class="feedback-form" >
            <h2>We'd Love to Hear Your Feedback!</h2>
            <p>Please take a moment to share your thoughts and help us improve.</p>
    
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">
                </div>
    
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </div>
    
                <div class="form-group">
                    <label for="subject" class="required">Subject:</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
    
                <div class="form-group">
                    <label for="rating" class="required">Overall Experience:</label>
                    <select id="rating" name="rating" required>
                        <option value="">-- Select --</option>
                        <option value="5">Excellent</option>
                        <option value="4">Very Good</option>
                        <option value="3">Good</option>
                        <option value="2">Fair</option>
                        <option value="1">Poor</option>
                    </select>
                </div>
    
                <div class="form-group">
                    <label for="comments" class="required">Comments:</label>
                    <textarea id="comments" name="comments" rows="5" required></textarea>
                </div>
    
                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2025 Kolhapur City. All rights reserved.</p>
        <div class="social-icons">
            <a href="https://www.linkedin.com" target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://www.instagram.com" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com" target="_blank">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://www.whatsapp.com" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </footer>
</body>
</html>
